<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo-main.png">
    <title>404 — Page Not Found | VERITAS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .error-content {
            z-index: 10;
            max-width: 600px;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            font-family: var(--font-display);
            line-height: 1;
            margin-bottom: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(124, 92, 255, 0.3));
        }

        .error-tagline {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .error-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .background-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            z-index: 1;
        }

        .glow-1 {
            top: 20%;
            left: 10%;
            width: 400px;
            height: 400px;
            background: var(--accent-purple);
        }

        .glow-2 {
            bottom: 10%;
            right: 15%;
            width: 350px;
            height: 350px;
            background: var(--accent-gold);
        }

        .action-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>
    <div class="background-decoration">
        <div class="glow-circle glow-1"></div>
        <div class="glow-circle glow-2"></div>
    </div>

    <main class="error-page">
        <div class="error-content" data-aos="fade-up">
            <a href="../index.html" class="brand-name"
                style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px;">
                <img src="../assets/images/logo/logo-main.png" alt="Veritas Logo" style="width: 50px;">
                <h2
                    style="font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 4px; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 0;">
                    VERITAS</h2>
            </a>
            <h1 class="error-code">404</h1>
            <div class="error-tagline">Evidence Missing</div>
            <p class="error-desc">
                The intelligence you're looking for seems to have been purged or relocated. Our investigators couldn't
                find a trace of this page in our database.
            </p>
            <div class="action-btns">
                <a href="../index.html" class="btn btn-primary">Return to Headquarters</a>
                <a href="contact.html" class="btn btn-outline">Report a Discrepancy</a>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
</body>

</html>
